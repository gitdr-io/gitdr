version: "2"

run:
  # Loading packages means type-checking every dependency, and on a cold build cache that is
  # slow enough to blow through 5m before a single linter runs. This is a guard against a
  # pathological hang, not a speed limit; the CI job timeout is the real bound.
  timeout: 15m

linters:
  default: standard
  enable:
    - forbidigo   # enforce the create-only storage invariant
    - bodyclose
    - misspell
    - unconvert
  settings:
    forbidigo:
      analyze-types: true
      forbid:
        # Invariant #3: storage is append-only; no deletion anywhere in the tree.
        - pattern: 'DeleteObjects?\('
          msg: "storage is create-only; object deletion is forbidden (invariant #3)"
        - pattern: 'DeleteBucket\('
          msg: "storage is create-only; bucket deletion is forbidden (invariant #3)"
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - forbidigo

formatters:
  enable:
    - gofmt
    - goimports
