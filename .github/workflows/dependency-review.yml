# Dependency Review, on PRs, block newly-introduced dependencies with known vulns or
# disallowed licenses before they merge. Satisfies OpenSSF Scorecard's Dependency-Update
# posture alongside Renovate. Actions pinned to SHAs.
name: dependency-review

on:
  pull_request:
    branches: [main]

permissions: {}

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Deny egress by default; see ci.yml. This one only reads the PR's dependency diff and
      # the advisory database, both through the API.
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
